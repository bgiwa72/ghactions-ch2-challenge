name: Ch2 Challenge

on: [push, workflow_dispatch]

jobs:
  test:
    name: Test Code
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install Dependencies
        run: bun Install

      - name: Run Commands
        run: |
          echo "Testing with no seed ..."
          bun run random-number-generator.jobs
          echo ""

          echo "Testing with string seed ..."
          bun run random-number-generator.jobs "test-seed"
          echo ""

          echo "Tesing with numeric seed"
          bun run random-number-generator.jobs 1906
          echo "Generated report:"
          cat report.txt


      - name: Upload report.txt as test-report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt


  build:
    name: Build Executables
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install Dependencies
        run: bun Install

      - name: Create Executables
        run: bun run build

      - name: List Executables
        run: ls -la random-number-generator-*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: random-number-generator-executables
          path: ./random-number-generator-*

  test-linux:
    name: Test Linux Executables
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download the artifact
        uses: actions/download-artifact@v4

      - name: Make binary executable
        run: chmod +x random-number-generator-linux

      - name: Install Dependencies
        run: bun Install

      - name: Run Commands
        run: |
          echo: "Testing with no seeds"
          ./random-number-generator-linux
          echo ""

          echo: "Testing with string seed"
          ./random-number-generator-linux "test-seed"
          echo ""

          echo: "Testing with numeric seed"
          ./random-number-generator-linux 1906
          echo ""

      - name: Upload report.txt as linux-test-report
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-report
          path: report.txt



